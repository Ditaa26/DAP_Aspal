<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Galeri Proyek – Dita Aryani Putri</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --primary: #1a1a2e;
  --accent: #b8860b;
  --accent-light: #d4a017;
  --white: #ffffff;
  --off-white: #fafaf8;
  --light-bg: #f5f3ee;
  --border: #e8e4dc;
  --text: #1a1a1a;
  --text-mid: #4a4a4a;
  --shadow-lg: 0 16px 48px rgba(0,0,0,0.18);
}
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
html { font-size: 17px; scroll-behavior: smooth; }
body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--off-white); color: var(--text); }

/* NAVBAR */
nav {
  position: sticky; top: 0; z-index: 100;
  display: flex; align-items: center; justify-content: space-between;
  padding: 1.1rem 5%; background: rgba(255,255,255,0.97);
  backdrop-filter: blur(12px); border-bottom: 1px solid var(--border);
  box-shadow: 0 2px 12px rgba(0,0,0,0.06);
}
.nav-logo { font-family: 'Playfair Display', serif; font-size: 1.25rem; font-weight: 700; color: var(--primary); text-decoration: none; }
.nav-logo span { color: var(--accent); }
.back-btn { display: inline-flex; align-items: center; gap: 0.5rem; color: var(--text-mid); text-decoration: none; font-size: 0.9rem; font-weight: 600; transition: color 0.2s; padding: 0.5rem 1.1rem; border: 1.5px solid var(--border); border-radius: 6px; }
.back-btn:hover { color: var(--accent); border-color: var(--accent); }

/* PAGE HERO */
.page-hero { background: var(--primary); padding: 3.5rem 5%; text-align: center; position: relative; overflow: hidden; }
.page-hero::before { content: ''; position: absolute; inset: 0; background: radial-gradient(circle at 20% 50%, rgba(184,134,11,0.12) 0%, transparent 60%); }
.page-hero h1 { font-family: 'Playfair Display', serif; font-size: clamp(1.9rem, 4vw, 3rem); color: var(--white); font-weight: 700; margin-bottom: 0.7rem; position: relative; }
.page-hero h1 em { color: var(--accent-light); font-style: italic; }
.page-hero p { font-size: 1rem; color: rgba(255,255,255,0.55); position: relative; }
.photo-count { display: inline-block; margin-top: 1rem; background: rgba(184,134,11,0.18); border: 1px solid rgba(184,134,11,0.3); border-radius: 100px; padding: 0.35rem 1rem; font-size: 0.82rem; color: var(--accent-light); font-weight: 600; letter-spacing: 0.06em; position: relative; }

/* GALLERY */
.gallery-section { max-width: 1280px; margin: 0 auto; padding: 2.5rem 4% 5rem; }

/* Uniform square grid */
.photo-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }

.photo-item {
  aspect-ratio: 1 / 1;
  border-radius: 8px;
  overflow: hidden;
  cursor: pointer;
  position: relative;
  background: #22223a;
}
.photo-item img { width: 100%; height: 100%; object-fit: cover; display: block; transition: transform 0.45s ease; }
.photo-item:hover img { transform: scale(1.07); }

.photo-item .overlay {
  position: absolute; inset: 0;
  background: linear-gradient(to top, rgba(0,0,0,0.55) 0%, transparent 55%);
  opacity: 0; transition: opacity 0.3s;
  display: flex; align-items: flex-end; padding: 0.9rem;
}
.photo-item:hover .overlay { opacity: 1; }
.overlay-num { font-size: 0.8rem; color: rgba(255,255,255,0.7); font-weight: 600; letter-spacing: 0.06em; }

.photo-item::after { content: ''; position: absolute; inset: 0; border: 2.5px solid transparent; border-radius: 8px; transition: border-color 0.3s; pointer-events: none; }
.photo-item:hover::after { border-color: var(--accent); }

.photo-placeholder { width: 100%; height: 100%; background: linear-gradient(135deg, #252535, #1a1a2e); display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 0.5rem; }
.photo-placeholder span { font-size: 0.72rem; color: rgba(255,255,255,0.18); text-align: center; padding: 0 0.5rem; }

/* LIGHTBOX */
#lightbox { display: none; position: fixed; inset: 0; z-index: 9999; background: rgba(0,0,0,0.94); align-items: center; justify-content: center; }
#lightbox.open { display: flex; }
.lb-inner { position: relative; max-width: 92vw; max-height: 92vh; display: flex; align-items: center; justify-content: center; }
#lb-img { max-width: 88vw; max-height: 86vh; object-fit: contain; border-radius: 6px; box-shadow: 0 24px 80px rgba(0,0,0,0.6); display: block; }

.lb-close { position: fixed; top: 1.2rem; right: 1.5rem; width: 42px; height: 42px; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); border-radius: 50%; color: white; font-size: 1.1rem; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: background 0.2s; z-index: 10000; }
.lb-close:hover { background: rgba(255,255,255,0.22); }

.lb-nav { position: fixed; top: 50%; transform: translateY(-50%); width: 48px; height: 48px; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); border-radius: 50%; color: white; font-size: 1.3rem; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: background 0.2s; z-index: 10000; }
.lb-nav:hover { background: rgba(255,255,255,0.22); }
#lb-prev { left: 1.2rem; }
#lb-next { right: 1.2rem; }
#lb-counter { position: fixed; top: 1.4rem; left: 50%; transform: translateX(-50%); color: rgba(255,255,255,0.45); font-size: 0.82rem; letter-spacing: 0.1em; }

/* CTA */
.cta-bar { background: var(--primary); padding: 3.5rem 5%; text-align: center; }
.cta-bar h2 { font-family: 'Playfair Display', serif; font-size: 1.9rem; color: var(--white); margin-bottom: 0.8rem; }
.cta-bar p { color: rgba(255,255,255,0.55); margin-bottom: 2rem; font-size: 0.97rem; }
.wa-btns { display: flex; gap: 1rem; justify-content: center; flex-wrap: wrap; }
.btn-wa { display: inline-flex; align-items: center; gap: 0.7rem; background: #25D366; color: white; padding: 0.9rem 1.8rem; border-radius: 8px; font-weight: 700; font-size: 0.97rem; text-decoration: none; transition: all 0.3s; }
.btn-wa:hover { background: #20c05c; transform: translateY(-2px); box-shadow: 0 8px 24px rgba(37,211,102,0.35); }
.btn-wa-2 { background: #1da851; }
.btn-wa-2:hover { background: #18943f; }
.btn-wa svg { width: 20px; height: 20px; flex-shrink: 0; }

/* RESPONSIVE */
@media (max-width: 900px) { .photo-grid { grid-template-columns: repeat(3, 1fr); } }
@media (max-width: 600px) {
  .photo-grid { grid-template-columns: repeat(2, 1fr); gap: 7px; }
  .lb-nav { display: none; }
  .gallery-section { padding: 1.5rem 3% 4rem; }
}
</style>
</head>
<body>

<nav>
  <a href="index.html" class="nav-logo">Dita <span>Aryani</span> Putri</a>
  <a href="index.html" class="back-btn">← Kembali</a>
</nav>

<div class="page-hero">
  <h1>Galeri <em>Proyek</em></h1>
  <p>Dokumentasi hasil pekerjaan kami dari berbagai proyek pengaspalan</p>
  <div class="photo-count" id="photo-count">Memuat foto...</div>
</div>

<div class="gallery-section">
  <div class="photo-grid" id="photo-grid"></div>
</div>

<!-- LIGHTBOX -->
<div id="lightbox" onclick="handleLbClick(event)">
  <button class="lb-close" onclick="closeLb()">✕</button>
  <button class="lb-nav" id="lb-prev" onclick="event.stopPropagation();navigateLb(-1)">‹</button>
  <div class="lb-inner"><img id="lb-img" src="" alt=""></div>
  <button class="lb-nav" id="lb-next" onclick="event.stopPropagation();navigateLb(1)">›</button>
  <div id="lb-counter"></div>
</div>
<script>
// ================================================================
// DAFTAR FOTO — samakan dengan yang di dita-aryani-putri.html
// ================================================================
const FOTO_GALERI = [
  "images/1.jpeg",
  "images/2.jpeg",
  "images/3.jpeg",
  "images/4.jpeg",
  "images/5.jpeg",
  "images/6.jpeg",
  "images/7.jpeg",
  "images/8.jpeg",
  "images/9.jpeg",
  "images/10.jpeg",
  "images/11.jpeg",
  "images/12.jpeg",
  "images/13.jpeg",
  "images/14.jpeg",
  "images/15.jpeg",
  "images/16.jpeg",
  "images/17.jpeg",
  "images/18.jpeg",
];

// Build grid
const grid = document.getElementById('photo-grid');
document.getElementById('photo-count').textContent = FOTO_GALERI.length + ' Foto Proyek';

FOTO_GALERI.forEach((src, idx) => {
  const item = document.createElement('div');
  item.className = 'photo-item';
  item.onclick = () => openLb(idx);
  item.innerHTML = `
    <img src="${src}" alt="Foto Proyek ${idx + 1}"
      onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
    <div class="photo-placeholder" style="display:none">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.12)" stroke-width="1.5">
        <rect x="3" y="3" width="18" height="18" rx="2"/>
        <path d="M3 9l4-4 4 4 4-4 4 4"/><circle cx="8.5" cy="13.5" r="1.5"/>
      </svg>
      <span>${src}</span>
    </div>
    <div class="overlay"><span class="overlay-num">Foto ${idx + 1}</span></div>
  `;
  grid.appendChild(item);
});

// Lightbox
let cur = 0;
function openLb(idx) {
  cur = idx; updateLb();
  document.getElementById('lightbox').classList.add('open');
  document.body.style.overflow = 'hidden';
}
function updateLb() {
  document.getElementById('lb-img').src = FOTO_GALERI[cur];
  document.getElementById('lb-counter').textContent = (cur + 1) + ' / ' + FOTO_GALERI.length;
}
function navigateLb(dir) { cur = (cur + dir + FOTO_GALERI.length) % FOTO_GALERI.length; updateLb(); }
function closeLb() { document.getElementById('lightbox').classList.remove('open'); document.body.style.overflow = ''; }
function handleLbClick(e) { if (e.target === document.getElementById('lightbox')) closeLb(); }
document.addEventListener('keydown', e => {
  if (!document.getElementById('lightbox').classList.contains('open')) return;
  if (e.key === 'Escape') closeLb();
  if (e.key === 'ArrowLeft') navigateLb(-1);
  if (e.key === 'ArrowRight') navigateLb(1);
});
</script>
</body>
</html>
